<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>科幻风格展示页</title>
    <style>
        /* 全局样式重置 */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Orbitron', sans-serif; /* 科幻风格字体 */
        }

        /* 科幻背景特效容器 */
        .bg-container {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: #0a0a1a; /* 深空底色 */
            overflow: hidden;
            z-index: -1; /* 背景置于内容下方 */
        }

        /* 网格特效 - 科幻数字网格 */
        .grid {
            position: absolute;
            width: 100%;
            height: 100%;
            background-image: 
                linear-gradient(rgba(0, 255, 255, 0.1) 1px, transparent 1px),
                linear-gradient(90deg, rgba(0, 255, 255, 0.1) 1px, transparent 1px);
            background-size: 40px 40px;
            animation: gridMove 20s linear infinite;
        }

        /* 粒子特效 - 漂浮的光点 */
        .particles {
            position: absolute;
            width: 100%;
            height: 100%;
        }

        /* 文字和图片展示容器 */
        .content-container {
            position: relative;
            z-index: 1;
            max-width: 1400px; /* 加宽容器适配更多图片 */
            margin: 0 auto;
            padding: 50px 20px;
            color: #00ffff; /* 科幻青色文字 */
        }

        /* 标题样式 */
        .main-title {
            font-size: 3.5rem;
            text-align: center;
            margin-bottom: 50px;
            text-shadow: 0 0 10px #00ffff, 0 0 20px #00ffff;
            letter-spacing: 5px;
        }

        /* 副标题样式 */
        .sub-title {
            font-size: 1.5rem;
            text-align: center;
            margin-bottom: 80px;
            color: #99ffff;
            text-shadow: 0 0 5px #00ffff;
        }

        /* 图片展示网格 - 优化自适应布局 */
        .image-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr)); /* 缩小最小宽度，适配更多列 */
            gap: 20px; /* 减小间距，适配更多图片 */
        }

        /* 图片卡片样式 */
        .image-card {
            background: rgba(0, 30, 60, 0.6);
            border: 1px solid #00ffff;
            border-radius: 10px;
            padding: 15px;
            box-shadow: 0 0 15px rgba(0, 255, 255, 0.3);
            transition: transform 0.3s ease, box-shadow 0.3s ease;
            display: flex;
            flex-direction: column; /* 卡片内垂直布局 */
            height: 100%; /* 卡片高度自适应 */
        }

        .image-card:hover {
            transform: translateY(-10px);
            box-shadow: 0 0 25px rgba(0, 255, 255, 0.6);
        }

        /* 图片容器 - 核心：自适应图片大小 */
        .image-wrapper {
            flex: 1; /* 占满卡片剩余高度 */
            margin-bottom: 15px;
        }

        /* 图片样式 - 完全自适应 */
        .display-image {
            width: 100%;
            height: 100%; /* 高度自适应容器 */
            object-fit: cover; /* 保持比例，裁剪多余部分 */
            border-radius: 5px;
            border: 1px solid #00ffff;
        }

        /* 图片描述文字 */
        .image-desc {
            color: #ccffff;
            font-size: 1rem;
            text-align: center;
            line-height: 1.5;
            flex-shrink: 0; /* 文字区域不压缩 */
        }

        /* 动画效果 */
        @keyframes gridMove {
            0% {
                background-position: 0 0;
            }
            100% {
                background-position: 40px 40px;
            }
        }

        /* 响应式适配 */
        @media (max-width: 768px) {
            .main-title {
                font-size: 2.5rem;
            }
            .sub-title {
                font-size: 1.2rem;
            }
            .image-grid {
                grid-template-columns: 1fr; /* 移动端单列 */
            }
            .image-card {
                padding: 10px;
            }
        }

        /* 平板适配 */
        @media (min-width: 769px) and (max-width: 1200px) {
            .image-grid {
                grid-template-columns: repeat(2, 1fr); /* 平板双列 */
            }
        }

        /* 桌面端适配 */
        @media (min-width: 1201px) {
            .image-grid {
                grid-template-columns: repeat(3, 1fr); /* 桌面端三列 */
            }
        }
    </style>
    <!-- 引入科幻风格字体 -->
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&display=swap" rel="stylesheet">
</head>
<body>
    <!-- 背景特效容器 -->
    <div class="bg-container">
        <div class="grid"></div>
        <div class="particles" id="particles"></div>
    </div>

    <!-- 内容展示容器 -->
    <div class="content-container">
        <!-- 【可编辑】主标题 - 修改这里的文字即可更改主页大标题 -->
        <h1 class="main-title">氧化锡/BCP薄膜</h1>
        
        <!-- 【可编辑】副标题 - 修改这里的文字即可更改主页副标题 -->
        <p class="sub-title">空穴阻挡层</p>

        <!-- 图片展示区域 - 10张图片 -->
        <div class="image-grid">
            <!-- 图片1 -->
            <div class="image-card">
                <div class="image-wrapper">
                    <img src="f5-1.png" alt="图片1" class="display-image">
                </div>
                <p class="image-desc"></p>
            </div>
            <!-- 图片2 -->
            <div class="image-card">
                <div class="image-wrapper">
                    <img src="f5-2.png" alt="图片2" class="display-image">
                </div>
                <p class="image-desc"></p>
            </div>
            <!-- 图片3 -->
            <div class="image-card">
                <div class="image-wrapper">
                    <img src="f5-3.png" alt="图片3" class="display-image">
                </div>
                <p class="image-desc"></p>
            </div>
            <!-- 图片4 -->
            <div class="image-card">
                <div class="image-wrapper">
                    <img src="f5-4.png" alt="图片4" class="display-image">
                </div>
                <p class="image-desc"></p>
            </div>
            <!-- 图片5 -->
            <div class="image-card">
                <div class="image-wrapper">
                    <img src="f5-5.png" alt="图片5" class="display-image">
                </div>
                <p class="image-desc"></p>
            </div>
            <!-- 图片6 -->
            <div class="image-card">
                <div class="image-wrapper">
                    <img src="f5-6.png" alt="图片6" class="display-image">
                </div>
                <p class="image-desc"></p>
            </div>
            <!-- 图片7 -->
            <div class="image-card">
                <div class="image-wrapper">
                    <img src="f5-7.png" alt="图片7" class="display-image">
                </div>
                <p class="image-desc"></p>
            </div>
            <!-- 图片8 -->
            <div class="image-card">
                <div class="image-wrapper">
                    <img src="f5-8.png" alt="图片8" class="display-image">
                </div>
                <p class="image-desc"></p>
            </div>
            <!-- 图片9 -->
            <div class="image-card">
                <div class="image-wrapper">
                    <img src="f5-9.png" alt="图片9" class="display-image">
                </div>
                <p class="image-desc"></p>
            </div>
            <!-- 图片10 -->
            <div class="image-card">
                <div class="image-wrapper">
                    <img src="f5-10.png" alt="图片10" class="display-image">
                </div>
                <p class="image-desc"></p>
            </div>
        </div>
    </div>

    <!-- 粒子特效脚本 -->
    <script>
        // 创建漂浮粒子特效
        function createParticles() {
            const particlesContainer = document.getElementById('particles');
            const particleCount = 100; // 粒子数量，可调整

            for (let i = 0; i < particleCount; i++) {
                const particle = document.createElement('div');
                // 随机粒子样式
                particle.style.position = 'absolute';
                particle.style.width = `${Math.random() * 3 + 1}px`;
                particle.style.height = particle.style.width;
                particle.style.backgroundColor = `rgba(0, 255, 255, ${Math.random() * 0.8 + 0.2})`;
                particle.style.borderRadius = '50%';
                particle.style.left = `${Math.random() * 100}%`;
                particle.style.top = `${Math.random() * 100}%`;
                particle.style.boxShadow = '0 0 5px #00ffff';
                particle.style.opacity = Math.random() * 0.7 + 0.3;
                
                // 粒子移动动画
                const animateParticle = () => {
                    particle.style.left = `${Math.random() * 100}%`;
                    particle.style.top = `${Math.random() * 100}%`;
                    particle.style.transition = `all ${Math.random() * 20 + 10}s linear`;
                };

                animateParticle();
                setInterval(animateParticle, Math.random() * 20000 + 10000);
                particlesContainer.appendChild(particle);
            }
        }

        // 页面加载完成后创建粒子
        window.onload = createParticles;
    </script>
</body>
</html>
