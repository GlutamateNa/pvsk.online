<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>科幻风格展示页</title>
    <style>
        /* 全局样式重置 */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Orbitron', sans-serif; /* 科幻风格字体 */
        }

        /* 科幻背景特效容器 */
        .bg-container {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: #0a0a1a; /* 深空底色 */
            overflow: hidden;
            z-index: -1; /* 背景置于内容下方 */
        }

        /* 网格特效 - 科幻数字网格 */
        .grid {
            position: absolute;
            width: 100%;
            height: 100%;
            background-image: 
                linear-gradient(rgba(0, 255, 255, 0.1) 1px, transparent 1px),
                linear-gradient(90deg, rgba(0, 255, 255, 0.1) 1px, transparent 1px);
            background-size: 40px 40px;
            animation: gridMove 20s linear infinite;
        }

        /* 粒子特效 - 漂浮的光点 */
        .particles {
            position: absolute;
            width: 100%;
            height: 100%;
        }

        /* 文字和图片展示容器 */
        .content-container {
            position: relative;
            z-index: 1;
            max-width: 1200px;
            margin: 0 auto;
            padding: 50px 20px;
            color: #00ffff; /* 科幻青色文字 */
        }

        /* 标题样式 */
        .main-title {
            font-size: 3.5rem;
            text-align: center;
            margin-bottom: 50px;
            text-shadow: 0 0 10px #00ffff, 0 0 20px #00ffff;
            letter-spacing: 5px;
        }

        /* 副标题样式 */
        .sub-title {
            font-size: 1.5rem;
            text-align: center;
            margin-bottom: 80px;
            color: #99ffff;
            text-shadow: 0 0 5px #00ffff;
        }

        /* 图片展示网格 */
        .image-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 30px;
        }

        /* 图片卡片样式 */
        .image-card {
            background: rgba(0, 30, 60, 0.6);
            border: 1px solid #00ffff;
            border-radius: 10px;
            padding: 20px;
            box-shadow: 0 0 15px rgba(0, 255, 255, 0.3);
            transition: transform 0.3s ease, box-shadow 0.3s ease;
        }

        .image-card:hover {
            transform: translateY(-10px);
            box-shadow: 0 0 25px rgba(0, 255, 255, 0.6);
        }

        /* 图片样式 */
        .display-image {
            width: 100%;
            height: 250px;
            object-fit: cover;
            border-radius: 5px;
            border: 1px solid #00ffff;
            margin-bottom: 15px;
        }

        /* 图片描述文字 */
        .image-desc {
            color: #ccffff;
            font-size: 1rem;
            text-align: center;
            line-height: 1.5;
        }

        /* 动画效果 */
        @keyframes gridMove {
            0% {
                background-position: 0 0;
            }
            100% {
                background-position: 40px 40px;
            }
        }

        /* 响应式适配 */
        @media (max-width: 768px) {
            .main-title {
                font-size: 2.5rem;
            }
            .sub-title {
                font-size: 1.2rem;
            }
            .image-grid {
                grid-template-columns: 1fr;
            }
        }
    </style>
    <!-- 引入科幻风格字体 -->
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&display=swap" rel="stylesheet">
</head>
<body>
    <!-- 背景特效容器 -->
    <div class="bg-container">
        <div class="grid"></div>
        <div class="particles" id="particles"></div>
    </div>

    <!-- 内容展示容器 -->
    <div class="content-container">
        <!-- 【可编辑】主标题 - 修改这里的文字即可更改主页大标题 -->
        <h1 class="main-title">ITO薄膜</h1>
        
        <!-- 【可编辑】副标题 - 修改这里的文字即可更改主页副标题 -->
        <p class="sub-title">透明导电基底</p>

        <!-- 图片展示区域 -->
        <div class="image-grid">
            <!-- 【可编辑】图片卡片1 - f1-1.png -->
            <div class="image-card">
                <!-- 修改src属性替换图片，格式为f1-1.png/f1-2.png等 -->
                <img src="f1-1.png" alt="图片1" class="display-image">
                <!-- 修改这里的文字更改第一张图片的描述 -->
                <p class="image-desc">111</p>
            </div>

            <!-- 【可编辑】图片卡片2 - f1-2.png -->
            <div class="image-card">
                <img src="f1-2.png" alt="图片2" class="display-image">
                <p class="image-desc">111</p>
            </div>

            <!-- 【可编辑】图片卡片3 - f1-3.png（可按需添加/删除） -->
            <div class="image-card">
                <img src="f1-3.png" alt="图片3" class="display-image">
                <p class="image-desc">111</p>
            </div>

            <!-- 【可编辑】如需添加更多图片，复制上面的image-card块，修改src为f1-4.png、f1-5.png等即可 -->
        </div>
    </div>

    <!-- 粒子特效脚本 -->
    <script>
        // 创建漂浮粒子特效
        function createParticles() {
            const particlesContainer = document.getElementById('particles');
            const particleCount = 100; // 粒子数量，可调整

            for (let i = 0; i < particleCount; i++) {
                const particle = document.createElement('div');
                // 随机粒子样式
                particle.style.position = 'absolute';
                particle.style.width = `${Math.random() * 3 + 1}px`;
                particle.style.height = particle.style.width;
                particle.style.backgroundColor = `rgba(0, 255, 255, ${Math.random() * 0.8 + 0.2})`;
                particle.style.borderRadius = '50%';
                particle.style.left = `${Math.random() * 100}%`;
                particle.style.top = `${Math.random() * 100}%`;
                particle.style.boxShadow = '0 0 5px #00ffff';
                particle.style.opacity = Math.random() * 0.7 + 0.3;
                
                // 粒子移动动画
                const animateParticle = () => {
                    particle.style.left = `${Math.random() * 100}%`;
                    particle.style.top = `${Math.random() * 100}%`;
                    particle.style.transition = `all ${Math.random() * 20 + 10}s linear`;
                };

                animateParticle();
                setInterval(animateParticle, Math.random() * 20000 + 10000);
                particlesContainer.appendChild(particle);
            }
        }

        // 页面加载完成后创建粒子
        window.onload = createParticles;
    </script>
</body>
</html>
